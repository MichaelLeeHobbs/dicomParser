name: Publish

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write # create the GitHub Release
    id-token: write # npm Trusted Publishing (OIDC) + provenance

jobs:
    publish:
        name: Publish to npm
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: pnpm/action-setup@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
                  registry-url: https://registry.npmjs.org
            - run: pnpm install --frozen-lockfile
            - run: pnpm run lint
            - run: pnpm run typecheck
            - run: pnpm run test:coverage
            - run: pnpm run build

            # A prerelease must not become `latest`. Derive the dist-tag from the
            # version: 2.0.0-alpha.1 -> alpha, 2.0.0-rc.1 -> rc, 2.0.0 -> latest.
            - name: Determine npm dist-tag
              id: disttag
              run: |
                  VERSION="$(node -p 'require("./package.json").version')"
                  if [ "$GITHUB_REF_NAME" != "v$VERSION" ]; then
                      echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $VERSION"
                      exit 1
                  fi
                  case "$VERSION" in
                      *-*) PRERELEASE="${VERSION#*-}"; TAG="${PRERELEASE%%.*}" ;;
                      *)   TAG="latest" ;;
                  esac
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  echo "Publishing $VERSION under dist-tag '$TAG'"

            - run: npm publish --provenance --access public --tag "${{ steps.disttag.outputs.tag }}"

            # Mirror the npm release as a GitHub Release with auto-generated notes.
            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  EXTRA=""
                  if [ "${{ steps.disttag.outputs.tag }}" != "latest" ]; then
                      EXTRA="--prerelease"
                  fi
                  gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --title "$GITHUB_REF_NAME" $EXTRA
